<!doctype html>
<html lang="it">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Figma Capture</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        width: 240px;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #1e1e1e;
        color: #fff;
        padding: 16px;
      }

      .header {
        display: flex;
        align-items: center;
        gap: 10px;
        margin-bottom: 16px;
      }

      .header svg {
        flex-shrink: 0;
      }

      .header-text h1 {
        font-size: 14px;
        font-weight: 600;
        line-height: 1.2;
      }

      .header-text p {
        font-size: 11px;
        color: #999;
        margin-top: 2px;
      }

      .page-info {
        background: #2a2a2a;
        border-radius: 6px;
        padding: 8px 10px;
        margin-bottom: 12px;
        font-size: 11px;
        color: #aaa;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      button {
        width: 100%;
        padding: 10px;
        border: none;
        border-radius: 8px;
        font-size: 13px;
        font-weight: 600;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        transition: opacity 0.15s, transform 0.1s;
      }

      button:active {
        transform: scale(0.98);
      }

      #capture-btn {
        background: #18a0fb;
        color: #fff;
      }

      #capture-btn:hover {
        opacity: 0.9;
      }

      #capture-btn:disabled {
        opacity: 0.5;
        cursor: not-allowed;
        transform: none;
      }

      .status {
        margin-top: 10px;
        font-size: 11px;
        text-align: center;
        min-height: 16px;
        color: #888;
      }

      .status.success {
        color: #0acf83;
      }

      .status.error {
        color: #f24e1e;
      }

      .spinner {
        display: inline-block;
        width: 12px;
        height: 12px;
        border: 2px solid rgba(255, 255, 255, 0.3);
        border-top-color: #fff;
        border-radius: 50%;
        animation: spin 0.6s linear infinite;
      }

      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }
    </style>
  </head>
  <body>
    <div class="header">
      <svg width="24" height="36" viewBox="0 0 38 57" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M19 28.5C19 24.9 21.9 22 25.5 22C29.1 22 32 24.9 32 28.5C32 32.1 29.1 35 25.5 35C21.9 35 19 32.1 19 28.5Z" fill="#1ABCFE"/>
        <path d="M6 41.5C6 37.9 8.9 35 12.5 35H19V41.5C19 45.1 16.1 48 12.5 48C8.9 48 6 45.1 6 41.5Z" fill="#0ACF83"/>
        <path d="M19 9V22H25.5C29.1 22 32 19.1 32 15.5C32 11.9 29.1 9 25.5 9H19Z" fill="#FF7262"/>
        <path d="M6 15.5C6 19.1 8.9 22 12.5 22H19V9H12.5C8.9 9 6 11.9 6 15.5Z" fill="#F24E1E"/>
        <path d="M6 28.5C6 32.1 8.9 35 12.5 35H19V22H12.5C8.9 22 6 24.9 6 28.5Z" fill="#FF7262"/>
      </svg>
      <div class="header-text">
        <h1>Figma Capture</h1>
        <p>Cattura la pagina corrente</p>
      </div>
    </div>

    <div class="page-info" id="page-url">Caricamento...</div>

    <button id="capture-btn">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/>
        <circle cx="12" cy="13" r="4"/>
      </svg>
      Cattura su Figma
    </button>

    <div class="status" id="status"></div>

    <script src="popup.js"></script>
  </body>
</html>
